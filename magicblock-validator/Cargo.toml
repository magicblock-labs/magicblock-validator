[package]
name = "magicblock-validator"
version.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
license.workspace = true
edition.workspace = true
default-run = "magicblock-validator"

[dependencies]
console-subscriber = { workspace = true, optional = true }
magicblock-api = { workspace = true }
magicblock-core = { workspace = true }
magicblock-tui-client = { workspace = true, optional = true }
tracing = { workspace = true }
magicblock-config = { workspace = true }
magicblock-version = { workspace = true }
num_cpus = { workspace = true }
solana-signer = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread"] }

[features]
default = []
# Permission-aware query filtering
query-filtering = ["magicblock-api/query-filtering"]
# Full TEE integration: query filtering + TDX attestation quote.
tee = ["magicblock-api/tee", "query-filtering"]
tokio-console = [
    "console-subscriber",
    "tokio/tracing",
    "magicblock-core/tokio-console",
]
tui = ["magicblock-tui-client"]
