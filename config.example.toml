# ==============================================================================
# MagicBlock Validator Configuration
# ==============================================================================
# This file serves as a reference for all available configuration options.
# ALL FIELDS ARE OPTIONAL. If removed, the "Default" value listed in the 
# comments will be used.
#
# CONFIGURATION PRECEDENCE (Highest to Lowest):
# 1. CLI Arguments      (e.g. --basefee 500)
# 2. Environment Vars   (e.g. MBV_VALIDATOR_BASEFEE=500)
# 3. TOML Config File   (this file)
# 4. System Defaults
#
# ENVIRONMENT VARIABLES:
# Prefix: MBV_
# Splitter: Single underscore (_) denotes hierarchy depth.
# Naming:   Field names use kebab-case (preserve dashes).
# Example:  [ledger] block-time -> MBV_LEDGER_BLOCK-TIME
# ==============================================================================

# --- Core Settings ---

# The operational mode of the validator.
# Default: "ephemeral"
# Options: "ephemeral", "replica", "offline", "programs-replica"
# CLI: --lifecycle <MODE>
# Env: MBV_LIFECYCLE
lifecycle = "ephemeral"

# Remote cluster to connect to for state/programs.
# Default: "devnet"
# Options: "devnet", "testnet", "mainnet", "localhost", or any valid URL.
# CLI: -r, --remote <URL_OR_ALIAS>
# Env: MBV_REMOTE
remote = "devnet"

# Root directory for application storage (ledger, accounts index, snapshots).
# Default: OS-specific temp dir (e.g., /tmp/magicblock-validator)
# CLI: --storage <PATH>
# Env: MBV_STORAGE
storage = "./data/validator-ledger"

# Network address to bind the main JSON RPC service to.
# Default: "127.0.0.1:8899"
# CLI: -l, --listen <ADDR>
# Env: MBV_LISTEN
listen = "127.0.0.1:8899"

# Network address to expose Prometheus metrics on.
# Default: None (Disabled)
# CLI: -m, --metrics <ADDR>
# Env: MBV_METRICS
metrics = "127.0.0.1:9090"

# ==============================================================================
# Validator Identity & Fees
# ==============================================================================
[validator]
# The minimum fee (in lamports) required to process a transaction.
# Default: 100
# CLI: --basefee <UINT>
# Env: MBV_VALIDATOR_BASEFEE
basefee = 100

# The validator's identity keypair in Base58 format.
# Default: A pre-generated devnet keypair (begins with 9Vo7Tb...)
# CLI: -k, --keypair <BASE58>
# Env: MBV_VALIDATOR_KEYPAIR
keypair = "9Vo7TbA5YfC5a33JhAi9Fb41usA6JwecHNRw3f9MzzHAM8hFnXTzL5DcEHwsAFjuUZ8vNQcJ4XziRFpMc3gTgBQ"

# ==============================================================================
# Chain Commitment Strategy (L2 -> L1)
# ==============================================================================
# Note: These settings are NOT exposed via CLI flags.
[commit]
# The compute unit price (in micro-lamports) applied to commit transactions.
# Default: 1_000_000
# Env: MBV_COMMIT_COMPUTE-UNIT-PRICE
compute-unit-price = 1_000_000

# ==============================================================================
# Accounts Database (Performance & Storage)
# ==============================================================================
# Note: These settings are NOT exposed via CLI flags.
[accountsdb]
# Total size (in bytes) allocated for the memory-mapped accounts file.
# Default: 104,857,600 (100 MB)
# Env: MBV_ACCOUNTSDB_DATABASE-SIZE
database-size = 104_857_600

# Block size for storage allocation.
# Default: "block256"
# Options: "block128", "block256", "block512"
# Env: MBV_ACCOUNTSDB_BLOCK-SIZE
block-size = "block256"

# Size (in bytes) allocated for the accounts index.
# Default: 1,048,576 (1 MB)
# Env: MBV_ACCOUNTSDB_INDEX-SIZE
index-size = 1_048_576

# Maximum number of historical snapshots to keep on disk.
# Default: 4
# Env: MBV_ACCOUNTSDB_MAX-SNAPSHOTS
max-snapshots = 4

# How often (in slots) to take a snapshot of the database.
# Default: 1024
# Env: MBV_ACCOUNTSDB_SNAPSHOT-FREQUENCY
snapshot-frequency = 1024

# If true, wipes the accounts database on every startup.
# Default: false
# Env: MBV_ACCOUNTSDB_RESET
reset = false

# ==============================================================================
# Ledger & Block Production
# ==============================================================================
# Note: These settings are NOT exposed via CLI flags.
[ledger]
# Target duration for a block slot. Supports humantime (e.g. "400ms", "1s").
# Default: "400ms"
# Env: MBV_LEDGER_BLOCK-TIME
block-time = "400ms"

# Whether to verify that the ledger on disk belongs to the configured keypair.
# Default: true
# Env: MBV_LEDGER_VERIFY-KEYPAIR
verify-keypair = true

# If true, deletes the existing ledger directory on startup.
# Default: false
# Env: MBV_LEDGER_RESET
reset = false

# ==============================================================================
# ChainLink / Oracle Integration
# ==============================================================================
# Note: These settings are NOT exposed via CLI flags.
[chainlink]
# If true, creates and initializes Address Lookup Tables for oracle feeds.
# Default: false
# Env: MBV_CHAINLINK_PREPARE-LOOKUP-TABLES
prepare-lookup-tables = false

# Amount of lamports to automatically airdrop to oracle agents on startup.
# Default: 0
# Env: MBV_CHAINLINK_AUTO-AIRDROP-LAMPORTS
auto-airdrop-lamports = 1_000_000_000

# Maximum number of accounts to monitor for price updates.
# Default: 0
# Env: MBV_CHAINLINK_MAX-MONITORED-ACCOUNTS
max-monitored-accounts = 1000

# ==============================================================================
# On-Chain Registration (Optional)
# ==============================================================================
# Used only if the validator registers itself on-chain.
# Note: These settings are NOT exposed via CLI flags.
[chain-operation]
# ISO 3166-1 alpha-2 country code (e.g. "US", "DE").
# Default: None
# Env: MBV_CHAIN-OPERATION_COUNTRY-CODE
country-code = "US"

# Fully Qualified Domain Name where this validator is reachable.
# Default: None
# Env: MBV_CHAIN-OPERATION_FQDN
fqdn = "https://validator.example.com"

# How often to claim accrued fees from the chain (e.g. "24h").
# Default: None
# Env: MBV_CHAIN-OPERATION_CLAIM-FEES-FREQUENCY
claim-fees-frequency = "24h"

# ==============================================================================
# Internal Task Scheduler
# ==============================================================================
# Note: These settings are NOT exposed via CLI flags.
[task-scheduler]
# If true, clears all pending scheduled tasks on startup.
# Default: false
# Env: MBV_TASK-SCHEDULER_RESET
reset = false

# ==============================================================================
# Pre-loaded Programs
# ==============================================================================
# You can specify multiple programs to load at startup.
# Note: These cannot be configured via CLI or Environment Variables.
# Default: Empty list

[[programs]]
id = "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA"
path = "./libs/spl_token.so"

[[programs]]
id = "Memo1UhkJRfHyvLMcVucJwxXeuD728EqVDDwQDxFMNo"
path = "./libs/spl_memo.so"
