lifecycle = "ephemeral"
remotes = ["http://0.0.0.0:7799", "ws://0.0.0.0:7800"]

[aperture]
listen = "0.0.0.0:8899"

[query-filtering]
enabled = true
jwt-secret = "query-filtering-integration-secret"
token-expiry-days = 1
challenge-ttl-seconds = 300

[commit]
compute-unit-price = 1_000_000

[chainlink]
max-monitored-accounts = 300

[accountsdb]
database-size = 1048576000
block-size = "block256"
index-size = 2048576
max-snapshots = 7
reset = true

[ledger]
reset = true

[metrics]
address = "0.0.0.0:9000"
