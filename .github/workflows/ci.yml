name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

on:
  push:
    branches: [master, dev, chore/self-hosted-ci]
  pull_request:
    types: [opened, reopened, synchronize]

env:
  CARGO_HOME: /cargo-home
  RUSTUP_HOME: /usr/local/rustup
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  RUSTFLAGS: -C link-arg=-fuse-ld=mold
  LOCAL_CACHE_BASE_PATH: /gha-local-cache

jobs:
  fmt:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}

      - name: Restore local Rust cache
        uses: khj809/github-action-cache-local-fs/restore@v1
        with:
          path: |
            /cargo-home/registry
            /cargo-home/git
            target
            test-integration/target
          key: rust-ci-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'test-integration/Cargo.lock', 'rust-toolchain.toml', 'test-integration/rust-toolchain.toml') }}
          cache-base-path: ${{ env.LOCAL_CACHE_BASE_PATH }}

      - name: Format check
        run: make ci-fmt

      - name: Format check (test-integration)
        run: |
          cd test-integration
          make ci-fmt

  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}

      - name: Restore local Rust cache
        uses: khj809/github-action-cache-local-fs/restore@v1
        with:
          path: |
            /cargo-home/registry
            /cargo-home/git
            target
            test-integration/target
          key: rust-ci-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'test-integration/Cargo.lock', 'rust-toolchain.toml', 'test-integration/rust-toolchain.toml') }}
          cache-base-path: ${{ env.LOCAL_CACHE_BASE_PATH }}

      - name: Lint
        run: make ci-lint

      - name: Lint (test-integration)
        run: |
          cd test-integration
          make ci-lint

  unit-tests:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}

      - name: Restore local Rust cache
        id: rust-cache-restore
        uses: khj809/github-action-cache-local-fs/restore@v1
        with:
          path: |
            /cargo-home/registry
            /cargo-home/git
            target
            test-integration/target
          key: rust-ci-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'test-integration/Cargo.lock', 'rust-toolchain.toml', 'test-integration/rust-toolchain.toml') }}
          cache-base-path: ${{ env.LOCAL_CACHE_BASE_PATH }}

      - name: Unit tests
        run: make ci-test-unit

      - name: Save local Rust cache
        if: success()
        uses: khj809/github-action-cache-local-fs/save@v1
        with:
          path: |
            /cargo-home/registry
            /cargo-home/git
            target
            test-integration/target
          key: ${{ steps.rust-cache-restore.outputs.cache-primary-key }}
          cache-base-path: ${{ env.LOCAL_CACHE_BASE_PATH }}

  build:
    needs: [fmt, lint, unit-tests]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}

      - name: Restore local Rust cache
        id: rust-cache-restore
        uses: khj809/github-action-cache-local-fs/restore@v1
        with:
          path: |
            /cargo-home/registry
            /cargo-home/git
            target
            test-integration/target
          key: integration-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'test-integration/Cargo.lock', 'rust-toolchain.toml', 'test-integration/rust-toolchain.toml') }}
          cache-base-path: ${{ env.LOCAL_CACHE_BASE_PATH }}

      - name: Build project
        run: cargo build --locked

      - name: Prebuild integration test binaries
        working-directory: test-integration
        run: cargo test --workspace --locked --no-run

      - name: Build SBF programs
        env:
          RUSTFLAGS: ""
        run: |
          make -C test-integration programs
          make chainlink-prep-programs -C test-integration/test-chainlink

      - name: Save local Rust cache
        if: success()
        uses: khj809/github-action-cache-local-fs/save@v1
        with:
          path: |
            /cargo-home/registry
            /cargo-home/git
            target
            test-integration/target
          key: ${{ steps.rust-cache-restore.outputs.cache-primary-key }}
          cache-base-path: ${{ env.LOCAL_CACHE_BASE_PATH }}

  integration-tests:
    needs: build
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        test:
          - schedulecommit
          - chainlink
          - cloning
          - restore_ledger
          - magicblock_api
          - config
          - table_mania
          - committor
          - pubsub
          - schedule_intents
          - task-scheduler
    name: "Integration: ${{ matrix.test }}"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}

      - name: Restore local Rust cache
        uses: khj809/github-action-cache-local-fs/restore@v1
        with:
          path: |
            /cargo-home/registry
            /cargo-home/git
            target
            test-integration/target
          key: integration-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'test-integration/Cargo.lock', 'rust-toolchain.toml', 'test-integration/rust-toolchain.toml') }}
          cache-base-path: ${{ env.LOCAL_CACHE_BASE_PATH }}

      - name: Run integration test
        env:
          RUN_TESTS: ${{ matrix.test }}
          SKIP_CHAINLINK_PREP: "1"
          PROGRAMS_SO: ""
          RUSTFLAGS: ""
        run: make ci-test-integration

  ci-status:
    if: always()
    needs: [fmt, lint, unit-tests, build, integration-tests]
    runs-on: self-hosted
    steps:
      - name: Verify pipeline
        run: |
          results=(
            "${{ needs.fmt.result }}"
            "${{ needs.lint.result }}"
            "${{ needs.unit-tests.result }}"
            "${{ needs.build.result }}"
            "${{ needs.integration-tests.result }}"
          )

          for r in "${results[@]}"; do
            if [[ "$r" != "success" ]]; then
              echo "::error::CI failed"
              exit 1
            fi
          done

          echo "All checks passed."
