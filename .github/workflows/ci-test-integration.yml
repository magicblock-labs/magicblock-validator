name: Run CI - Integration Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [master, dev]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  # Each shard is self-contained: it restores the shared rust-cache, builds the
  # validator binary + SBF programs (no-ops on warm cache), and runs its slice
  # of the tests. There is no upstream serial build job; all shards fan out at
  # t=0 so the critical path is `max(shard wall-clock)` instead of
  # `serial_build + max(shard)`.
  run_integration_tests:
    runs-on: ubuntu-latest-m
    strategy:
      matrix:
        batch_tests:
          - "schedulecommit"
          - "chainlink"
          - "cloning"
          - "restore_ledger"
          - "magicblock_api"
          - "config"
          - "table_mania"
          - "committor"
          - "committor_ix_multi"
          - "committor_bundles"
          - "committor_bundles_heavy"
          - "committor_intent_executor"
          - "pubsub"
          - "schedule_intents"
          - "task-scheduler"
      # While we iterate on this branch we want a single shard failure to
      # cancel the rest of the matrix so we don't burn ~50 min of runner time
      # on every false start. Flip back to `false` once it's green & stable.
      fail-fast: true
    name: Integration Tests - ${{ matrix.batch_tests }}
    steps:
      - name: Checkout this magicblock-validator
        uses: actions/checkout@v5
        with:
          path: magicblock-validator

      - uses: ./magicblock-validator/.github/actions/setup-build-env
        with:
          build_cache_key_name: "magicblock-validator-ci-test-integration-${{ hashFiles('magicblock-validator/Cargo.lock') }}"
          rust_toolchain_release: "1.94.1"
          github_access_token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./magicblock-validator/.github/actions/setup-solana

      # SBF programs are deterministic outputs of the program source dirs; cache
      # the .so files keyed on those sources so make-programs is a no-op when
      # nothing relevant changed.
      - name: Cache SBF program artifacts
        uses: actions/cache@v4
        with:
          path: |
            magicblock-validator/target/deploy
            magicblock-validator/test-integration/target/deploy
          # Include Cargo.lock and shared sources so the cache invalidates on
          # workspace dependency / shared-crate changes that the program
          # source dirs alone don't capture.
          key: sbf-programs-${{ runner.os }}-${{ hashFiles('magicblock-validator/Cargo.lock', 'magicblock-validator/test-integration/programs/**', 'magicblock-validator/magicblock-committor-program/**', 'magicblock-validator/programs/**', 'magicblock-validator/magicblock-magic-program-api/**', 'magicblock-validator/magicblock-core/**') }}
          restore-keys: |
            sbf-programs-${{ runner.os }}-

      - name: Build validator binary and SBF programs
        run: |
          cargo build --locked --bin magicblock-validator
          make -C test-integration programs
        shell: bash
        working-directory: magicblock-validator

      - name: Run integration tests - ${{ matrix.batch_tests }}
        run: |
          sudo prlimit --pid $$ --nofile=1048576:1048576
          sudo sysctl fs.inotify.max_user_instances=1280
          sudo sysctl fs.inotify.max_user_watches=655360
          make ci-test-integration
        shell: bash
        working-directory: magicblock-validator
        env:
          RUN_TESTS: ${{ matrix.batch_tests }}
          # Have the validator helper exec the prebuilt binary directly,
          # skipping the per-spawn `cargo build` + `cargo run` overhead.
          MAGICBLOCK_VALIDATOR_BIN: ${{ github.workspace }}/magicblock-validator/target/debug/magicblock-validator
