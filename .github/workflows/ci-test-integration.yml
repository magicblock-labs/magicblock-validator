name: Run CI - Integration Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [master, dev]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  # The build job exists purely to produce reusable artifacts (the validator
  # binary and the SBF program `.so` files) so the matrix shards never have to
  # invoke `cargo build` for those, nor `cargo build-sbf`. That removes minutes
  # of redundant work from each shard.
  build:
    # `extra-large` is more expensive per minute but the build job is the
    # hard serialization point in front of the matrix; every minute
    # we save here saves a minute on the critical path.
    runs-on: extra-large
    name: Build Artifacts
    env:
      SOLANA_VERSION: v3.1.5
      HOST_CARGO_JOBS: "8"
    steps:
      - name: Checkout this magicblock-validator
        uses: actions/checkout@v5
        with:
          path: magicblock-validator

      - uses: ./magicblock-validator/.github/actions/setup-build-env
        with:
          build_cache_key_name: "magicblock-validator-ci-test-integration-${{ hashFiles('magicblock-validator/Cargo.lock') }}"
          rust_toolchain_release: "1.94.1"
          github_access_token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./magicblock-validator/.github/actions/setup-solana
        with:
          solana_version: ${{ env.SOLANA_VERSION }}

      # SBF programs only depend on a small set of source dirs; cache them
      # directly so we skip cargo-build-sbf entirely on cache hits.
      - name: Cache SBF program artifacts
        uses: actions/cache@v4
        with:
          path: |
            magicblock-validator/target/deploy
            magicblock-validator/test-integration/target/deploy
          # Include Cargo.lock and shared sources so the cache invalidates on
          # workspace dependency / shared-crate changes that the program
          # source dirs alone don't capture. Also include rustc + solana
          # versions in the key so a toolchain bump invalidates stale .so
          # artifacts produced by the previous compiler.
          key: sbf-programs-${{ runner.os }}-${{ runner.arch }}-rust1.94.1-solana${{ env.SOLANA_VERSION }}-${{ hashFiles('magicblock-validator/Cargo.lock', 'magicblock-validator/test-integration/programs/**', 'magicblock-validator/magicblock-committor-program/**', 'magicblock-validator/programs/**', 'magicblock-validator/magicblock-magic-program-api/**', 'magicblock-validator/magicblock-core/**') }}

      # lld typically halves the link step on large rust workspaces.
      - name: Install lld linker
        run: sudo apt-get update && sudo apt-get install -y lld
        shell: bash

      - name: Build reusable artifacts (parallel)
        # The extra-large runner has enough CPU/RAM to overlap independent
        # build products. Keep SBF builds serial inside `make programs` because
        # parallel `cargo-build-sbf` invocations race on the shared
        # platform-tools install (~/.cache/solana/...).
        run: |
          set +e
          mkdir -p _integration_test_bins/test-runner

          RUSTFLAGS="-C link-arg=-fuse-ld=lld" \
            cargo build --locked --bin magicblock-validator -j "$HOST_CARGO_JOBS" >validator.log 2>&1 &
          validator_pid=$!

          make -C test-integration programs >programs.log 2>&1 &
          programs_pid=$!

          (
            set -euo pipefail
            RUSTFLAGS="-C link-arg=-fuse-ld=lld" \
            CARGO_PROFILE_TEST_DEBUG=0 \
              cargo test --manifest-path test-integration/Cargo.toml --locked --no-run --message-format=json -j "$HOST_CARGO_JOBS" \
                -p schedulecommit-test-security \
                -p schedulecommit-test-scenarios \
                -p test-chainlink \
                -p test-cloning \
                -p test-ledger-restore \
                -p test-magicblock-api \
                -p test-config \
                -p test-table-mania \
                -p schedulecommit-committor-service \
                -p test-pubsub \
                -p test-schedule-intent \
                -p test-task-scheduler \
                > _integration_test_bins/no-run.jsonl
            RUSTFLAGS="-C link-arg=-fuse-ld=lld" \
            CARGO_PROFILE_DEV_DEBUG=0 \
              cargo build --manifest-path test-integration/Cargo.toml --locked -p test-runner --bin run-tests -j "$HOST_CARGO_JOBS"
            cp test-integration/target/debug/run-tests _integration_test_bins/test-runner/run-tests
            strip _integration_test_bins/test-runner/run-tests || true
          ) >integration-build.log 2>&1 &
          integration_pid=$!

          wait $validator_pid
          validator_rc=$?
          wait $programs_pid
          programs_rc=$?
          wait $integration_pid
          integration_rc=$?

          set -e
          echo "===== validator build (rc=$validator_rc) ====="
          tail -n 400 validator.log || true
          echo "===== SBF program builds (rc=$programs_rc) ====="
          tail -n 400 programs.log || true
          echo "===== integration test binary builds (rc=$integration_rc) ====="
          tail -n 400 integration-build.log || true
          if [ "$validator_rc" -ne 0 ] || [ "$programs_rc" -ne 0 ] || [ "$integration_rc" -ne 0 ]; then
            echo "validator_rc=$validator_rc programs_rc=$programs_rc integration_rc=$integration_rc"
            exit 1
          fi
        shell: bash
        working-directory: magicblock-validator

      - name: Collect integration test binaries
        run: |
          set -euxo pipefail
          rm -rf _integration_test_bins/shards
          mkdir -p _integration_test_bins/shards

          copy_test_bin() {
            local test_file="$1"
            local shard="$2"
            local matches_file
            local src_path
            src_path="$(realpath "$test_file")"
            matches_file="_integration_test_bins/matches.txt"
            jq -r --arg src_path "$src_path" 'select(.reason == "compiler-artifact" and .executable != null and (.target.kind | index("test")) and .target.src_path == $src_path) | .executable' _integration_test_bins/no-run.jsonl > "$matches_file"
            match_count="$(awk 'END { print NR }' "$matches_file")"
            if [ "$match_count" -ne 1 ]; then
              matches_text="$(tr '\n' ' ' < "$matches_file")"
              echo "expected one binary for ${test_file}, found ${match_count}: ${matches_text}"
              exit 1
            fi
            test_bin="$(sed -n '1p' "$matches_file")"
            mkdir -p "_integration_test_bins/shards/${shard}"
            dest="_integration_test_bins/shards/${shard}/$(basename "$test_bin")"
            cp "$test_bin" "$dest"
            strip "$dest" || true
          }

          copy_package_tests() {
            local package_dir="$1"
            local shard="$2"
            while IFS= read -r test_file; do
              copy_test_bin "$test_file" "$shard"
            done < <(find "$package_dir/tests" -maxdepth 1 -name '*.rs' | sort)
          }

          copy_package_tests test-integration/schedulecommit/test-security schedulecommit
          copy_package_tests test-integration/schedulecommit/test-scenarios schedulecommit
          copy_package_tests test-integration/test-chainlink chainlink
          copy_package_tests test-integration/test-cloning cloning
          copy_package_tests test-integration/test-ledger-restore restore_ledger
          copy_package_tests test-integration/test-magicblock-api magicblock_api
          copy_package_tests test-integration/test-config config
          copy_package_tests test-integration/test-table-mania table_mania
          copy_test_bin test-integration/test-committor-service/tests/test_ix_commit_local.rs committor
          copy_test_bin test-integration/test-committor-service/tests/test_delivery_preparator.rs committor_preparators
          copy_test_bin test-integration/test-committor-service/tests/test_transaction_preparator.rs committor_preparators
          copy_test_bin test-integration/test-committor-service/tests/test_ix_commit_local.rs committor_ix_order
          copy_test_bin test-integration/test-committor-service/tests/test_ix_commit_local.rs committor_ix_multi
          copy_test_bin test-integration/test-committor-service/tests/test_ix_commit_local.rs committor_bundles
          copy_test_bin test-integration/test-committor-service/tests/test_ix_commit_local.rs committor_intent_bundles
          copy_test_bin test-integration/test-committor-service/tests/test_ix_commit_local.rs committor_bundles_heavy
          copy_test_bin test-integration/test-committor-service/tests/test_ix_commit_local.rs committor_commitfinalize
          copy_test_bin test-integration/test-committor-service/tests/test_intent_executor.rs committor_intent_executor
          copy_test_bin test-integration/test-committor-service/tests/test_intent_executor.rs committor_intent_executor_recovery
          copy_package_tests test-integration/test-pubsub pubsub
          copy_package_tests test-integration/test-schedule-intent schedule_intents
          copy_package_tests test-integration/test-task-scheduler task-scheduler

          find _integration_test_bins/shards -mindepth 2 -type f | wc -l
          du -sh _integration_test_bins/shards/*
        shell: bash
        working-directory: magicblock-validator

      - name: Upload validator binary
        uses: actions/upload-artifact@v4
        with:
          name: magicblock-validator-bin
          path: magicblock-validator/target/debug/magicblock-validator
          retention-days: 1
          if-no-files-found: error

      - name: Upload test runner binary
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-runner-bin
          path: magicblock-validator/_integration_test_bins/test-runner/run-tests
          retention-days: 1
          if-no-files-found: error

      - name: Upload SBF programs
        uses: actions/upload-artifact@v4
        with:
          name: sbf-programs
          path: |
            magicblock-validator/target/deploy/*.so
            magicblock-validator/test-integration/target/deploy/*.so
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - schedulecommit
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-schedulecommit
          path: magicblock-validator/_integration_test_bins/shards/schedulecommit/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - chainlink
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-chainlink
          path: magicblock-validator/_integration_test_bins/shards/chainlink/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - cloning
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-cloning
          path: magicblock-validator/_integration_test_bins/shards/cloning/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - restore_ledger
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-restore_ledger
          path: magicblock-validator/_integration_test_bins/shards/restore_ledger/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - magicblock_api
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-magicblock_api
          path: magicblock-validator/_integration_test_bins/shards/magicblock_api/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - config
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-config
          path: magicblock-validator/_integration_test_bins/shards/config/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - table_mania
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-table_mania
          path: magicblock-validator/_integration_test_bins/shards/table_mania/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - committor
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-committor
          path: magicblock-validator/_integration_test_bins/shards/committor/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - committor_preparators
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-committor_preparators
          path: magicblock-validator/_integration_test_bins/shards/committor_preparators/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - committor_ix_order
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-committor_ix_order
          path: magicblock-validator/_integration_test_bins/shards/committor_ix_order/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - committor_ix_multi
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-committor_ix_multi
          path: magicblock-validator/_integration_test_bins/shards/committor_ix_multi/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - committor_bundles
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-committor_bundles
          path: magicblock-validator/_integration_test_bins/shards/committor_bundles/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - committor_intent_bundles
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-committor_intent_bundles
          path: magicblock-validator/_integration_test_bins/shards/committor_intent_bundles/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - committor_bundles_heavy
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-committor_bundles_heavy
          path: magicblock-validator/_integration_test_bins/shards/committor_bundles_heavy/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - committor_commitfinalize
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-committor_commitfinalize
          path: magicblock-validator/_integration_test_bins/shards/committor_commitfinalize/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - committor_intent_executor
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-committor_intent_executor
          path: magicblock-validator/_integration_test_bins/shards/committor_intent_executor/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - committor_intent_executor_recovery
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-committor_intent_executor_recovery
          path: magicblock-validator/_integration_test_bins/shards/committor_intent_executor_recovery/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - pubsub
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-pubsub
          path: magicblock-validator/_integration_test_bins/shards/pubsub/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - schedule_intents
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-schedule_intents
          path: magicblock-validator/_integration_test_bins/shards/schedule_intents/*
          retention-days: 1
          if-no-files-found: error

      - name: Upload integration test binaries - task-scheduler
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-bins-task-scheduler
          path: magicblock-validator/_integration_test_bins/shards/task-scheduler/*
          retention-days: 1
          if-no-files-found: error

  run_integration_tests:
    needs: build
    runs-on: ubuntu-latest-m
    env:
      SOLANA_VERSION: v3.1.5
    strategy:
      matrix:
        batch_tests:
          - "committor"
          - "committor_bundles"
          - "committor_intent_executor"
          - "committor_bundles_heavy"
          - "committor_intent_executor_recovery"
          - "committor_ix_order"
          - "table_mania"
          - "committor_intent_bundles"
          - "committor_ix_multi"
          - "schedulecommit"
          - "committor_preparators"
          - "restore_ledger"
          - "committor_commitfinalize"
          - "chainlink"
          - "schedule_intents"
          - "cloning"
          - "task-scheduler"
          - "pubsub"
          - "magicblock_api"
          - "config"
      # While we iterate on this branch we want a single shard failure to
      # cancel the rest of the matrix so we don't burn ~50 min of runner time
      # on every false start. Flip back to `false` once it's green & stable.
      fail-fast: true
    name: Integration Tests - ${{ matrix.batch_tests }}
    steps:
      - name: Checkout this magicblock-validator
        uses: actions/checkout@v5
        with:
          path: magicblock-validator

      - uses: ./magicblock-validator/.github/actions/setup-solana
        with:
          solana_version: ${{ env.SOLANA_VERSION }}

      - name: Download prebuilt validator binary
        uses: actions/download-artifact@v4
        with:
          name: magicblock-validator-bin
          path: magicblock-validator/target/debug

      - name: Download prebuilt test runner binary
        uses: actions/download-artifact@v4
        with:
          name: integration-test-runner-bin
          path: magicblock-validator/_integration_test_runner

      - name: Download prebuilt SBF programs
        uses: actions/download-artifact@v4
        with:
          name: sbf-programs
          path: magicblock-validator/_sbf_artifact

      - name: Download prebuilt integration test binaries
        uses: actions/download-artifact@v4
        with:
          name: integration-test-bins-${{ matrix.batch_tests }}
          path: magicblock-validator/_integration_test_bins

      - name: Stage SBF programs into deploy dirs
        run: |
          set -euxo pipefail
          mkdir -p magicblock-validator/target/deploy
          mkdir -p magicblock-validator/test-integration/target/deploy
          if [ -d magicblock-validator/_sbf_artifact/target/deploy ]; then
            cp magicblock-validator/_sbf_artifact/target/deploy/*.so \
              magicblock-validator/target/deploy/
          fi
          if [ -d magicblock-validator/_sbf_artifact/test-integration/target/deploy ]; then
            cp magicblock-validator/_sbf_artifact/test-integration/target/deploy/*.so \
              magicblock-validator/test-integration/target/deploy/
          fi
          chmod +x magicblock-validator/target/debug/magicblock-validator
          chmod +x magicblock-validator/_integration_test_runner/run-tests
          chmod +x magicblock-validator/_integration_test_bins/*
        shell: bash

      - name: Run integration tests - ${{ matrix.batch_tests }}
        run: |
          sudo prlimit --pid $$ --nofile=1048576:1048576
          sudo sysctl fs.inotify.max_user_instances=1280
          sudo sysctl fs.inotify.max_user_watches=655360
          # Force make to reuse the staged .so files instead of rebuilding.
          touch test-integration/target/deploy/*.so target/deploy/*.so 2>/dev/null || true
          make ci-test-integration
        shell: bash
        working-directory: magicblock-validator
        env:
          RUN_TESTS: ${{ matrix.batch_tests }}
          # Have the validator helper exec the prebuilt binary directly,
          # skipping the per-spawn `cargo build` + `cargo run` overhead.
          MAGICBLOCK_VALIDATOR_BIN: ${{ github.workspace }}/magicblock-validator/target/debug/magicblock-validator
          # Execute the prebuilt runner instead of compiling it in every shard.
          INTEGRATION_TEST_RUNNER_BIN: ${{ github.workspace }}/magicblock-validator/_integration_test_runner/run-tests
          # Run uploaded libtest binaries directly instead of recompiling them
          # with `cargo test` in every shard.
          INTEGRATION_TEST_BIN_DIR: ${{ github.workspace }}/magicblock-validator/_integration_test_bins
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_PROFILE_TEST_DEBUG: "0"
          # A few integration tests have validator-timing races; allow up to
          # 3 retries before failing the shard.
          RUN_TEST_RETRIES: "3"
