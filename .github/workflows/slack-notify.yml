name: Notify PR Reviews on Slack

env:
  SLACK_USER_ID_BY_GITHUB: >-
    {"gabrielepicco":"U05KBBGBNR2","bmuddha":"U07UA8EMWUB","thlorenz":"U07JZ8TNDCM","taco-paco":"U08EV480NBD","snawaz":"U09F31XPU9H","lucacillario":"U08P8EL2SUU","crypto-vincent":"U08NN43TV6Y","kuldotha":"U087F2UMJC9","sporicle":"U08UP615N9X","dodecahedr0x":"U08LDC1L81Z","jonasxchen":"U08L7DK6UAJ"}

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event.review.id || github.event.requested_reviewer.login || github.event.requested_team.slug || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

on:
  pull_request:
    types: [review_requested]
  pull_request_review:
    types: [submitted]

jobs:
  notify-review-requested:
    if: github.event_name == 'pull_request' && github.event.action == 'review_requested'
    runs-on: ubuntu-latest
    steps:
      - name: Build Slack review message
        id: message
        uses: actions/github-script@v7
        with:
          script: |
            const slackUserIdByGithub = JSON.parse(process.env.SLACK_USER_ID_BY_GITHUB);
            const escapeMrkdwn = (value) => String(value ?? "")
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");
            const mention = (login) => {
              const slackUserId = slackUserIdByGithub[(login || "").toLowerCase()];
              return slackUserId ? `<@${slackUserId}>` : `*${escapeMrkdwn(login)}*`;
            };

            const pr = context.payload.pull_request;
            const requestedReviewer = context.payload.requested_reviewer?.login;
            const requestedTeam = context.payload.requested_team;
            const reviewerText = requestedReviewer
              ? mention(requestedReviewer)
              : requestedTeam
                ? `*${escapeMrkdwn(requestedTeam.name || requestedTeam.slug)}*`
                : "No reviewers found";
            const text = `👀 Review requested from ${reviewerText} on PR #${pr.number}: <${pr.html_url}|${escapeMrkdwn(pr.title)}> by *${escapeMrkdwn(pr.user.login)}*.`;

            core.setOutput("text", text);

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": ${{ toJson(steps.message.outputs.text) }},
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn", 
                    "text": ${{ toJson(steps.message.outputs.text) }}
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  notify-review:
    if: github.event_name == 'pull_request_review' && github.event.action == 'submitted'
    runs-on: ubuntu-latest
    steps:
      - name: Build Slack review message
        id: message
        uses: actions/github-script@v7
        with:
          script: |
            const slackUserIdByGithub = JSON.parse(process.env.SLACK_USER_ID_BY_GITHUB);
            const escapeMrkdwn = (value) => String(value ?? "")
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");
            const mention = (login) => {
              const slackUserId = slackUserIdByGithub[(login || "").toLowerCase()];
              return slackUserId ? `<@${slackUserId}>` : `*${escapeMrkdwn(login)}*`;
            };

            const pr = context.payload.pull_request;
            const reviewer = context.payload.review.user.login;
            const author = pr.user.login;
            const states = {
              approved: "approved",
              changes_requested: "changes requested",
              commented: "commented",
            };
            const state = states[context.payload.review.state] || context.payload.review.state || "submitted";
            const text = `📝 ${mention(author)} *${escapeMrkdwn(reviewer)}* submitted a *${escapeMrkdwn(state)}* review for PR #${pr.number}: <${pr.html_url}|${escapeMrkdwn(pr.title)}>.`;

            core.setOutput("text", text);

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": ${{ toJson(steps.message.outputs.text) }},
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ toJson(steps.message.outputs.text) }}
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
