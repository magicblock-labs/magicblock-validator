name: 'MagicBlock - Setup Solana'
description: 'Install Solana Test Validator and ensure it works'

inputs:
  solana_version:
    description: 'Anza Solana release version to install'
    required: false
    default: 'v3.1.5'

runs:
  using: "composite"
  steps:
      - name: Cache Solana CLI install
        id: cache-solana
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/solana/install/releases/${{ inputs.solana_version }}
            ~/.local/share/solana/install/active_release
          key: solana-cli-${{ runner.os }}-${{ inputs.solana_version }}

      - name: Install Solana Test Validator
        if: steps.cache-solana.outputs.cache-hit != 'true'
        shell: "bash"
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ inputs.solana_version }}/install)"

      - name: Add Solana to PATH
        shell: "bash"
        run: |
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Ensure Solana Test Validator is Installed
        shell: "bash"
        run: |
          solana-test-validator --version

