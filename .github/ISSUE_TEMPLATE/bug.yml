name: Bug
description: Something is broken or incorrect
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: report
    attributes:
      label: What happened
      description: Describe the bug and what you expected to happen
      placeholder: |
        **Observed:**
        **Expected:**
        **Steps to reproduce:**
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit / version
      placeholder: "git sha / tag"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Local (native)
        - Local (Docker)
        - Testnet
        - Mainnet
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / Arch
      placeholder: "e.g., macOS arm64, Linux x86_64"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Links
      description: Relevant logs, stack traces, or links
    validations:
      required: false
